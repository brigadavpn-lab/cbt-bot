# Обновление для сервера
version: '3.8'

services:
  # --- НАШ БОТ ---
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - db
      - redis
    command: >
      sh -c "poetry run alembic upgrade head &&
             poetry run python app/run_polling.py"

  # --- БАЗА ДАННЫХ ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cbt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- КЭШ ---
  redis:
    image: redis:7-alpine
    restart: always

volumes:
  postgres_data: