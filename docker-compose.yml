services:
  # --- НАШ БОТ ---
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # ОДНА СТРОКА - САМЫЙ НАДЕЖНЫЙ ВАРИАНТ:
    command: sh -c "alembic upgrade head && python -m app.run_polling"

  # --- БАЗА ДАННЫХ ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cbt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cbt_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- КЭШ ---
  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
