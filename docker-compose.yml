services:
  # --- НАШ БОТ ---
  bot:
    build: .
    restart: always
    env_file: .env
    depends_on:
      - db
      - redis
    # ОДНА СТРОКА - САМЫЙ НАДЕЖНЫЙ ВАРИАНТ:
    command: sh -c "alembic upgrade head && python -m app.run_polling"

  # --- БАЗА ДАННЫХ ---
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: cbt_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- КЭШ ---
  redis:
    image: redis:7-alpine
    restart: always

volumes:
  postgres_data:
